name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version
          sw_vers

      - name: Run tests
        run: |
          xcodebuild test \
            -project mchip.xcodeproj \
            -scheme mchip \
            -destination 'platform=macOS,arch=arm64' \
            -enableCodeCoverage YES \
            | xcpretty || (xcodebuild test \
              -project mchip.xcodeproj \
              -scheme mchip \
              -destination 'platform=macOS,arch=arm64' \
              -enableCodeCoverage YES)
